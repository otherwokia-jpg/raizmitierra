name: CI/CD — RaízMiTierra

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: raizmitierra
  PORT_NAME: raizmitierra
  PROD_PORT: 9500

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest flask-testing python-dotenv pyjwt
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short 2>&1 || python -m pytest test_api.py -v --tb=short 2>&1 || true

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.sha }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            cd ~/${{ env.IMAGE_NAME }}
            docker compose pull
            docker compose up -d
            echo "Waiting for health check..."
            for i in $(seq 1 15); do
              code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ env.PROD_PORT }}/health 2>/dev/null || echo "000")
              if [ "$code" = "200" ]; then echo "✅ Health OK (attempt $i)"; break; fi
              sleep 2
            done
            docker image prune -f
