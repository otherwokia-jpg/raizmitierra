# ── RaízMiTierra CMS — CI Pipeline ──
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 raizmitierra_server.py --count --max-complexity=15 --max-line-length=127 --statistics
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t raizmitierra:ci .

      - name: Verify image built
        run: docker image inspect raizmitierra:ci | jq .[].Size